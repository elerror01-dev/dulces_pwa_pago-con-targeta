<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dulces Magic</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="public/css/estilos.css">
  <script src="https://js.stripe.com/v3/"></script>
</head>

<body>
  <header>
    <h1>🍬 Dulces Magic</h1>
  </header>

  <main>
    <div class="productos">
      <button onclick="agregar('Gomitas', 10)">Gomitas $10</button>
      <button onclick="agregar('Chocolates', 10)">Chocolates $10</button>
      <button onclick="agregar('Caramelos', 10)">Caramelos $10</button>
    </div>

    <h2>🛒 Carrito</h2>
    <ul id="carrito"></ul>

    <h3>Total: $<span id="total">0</span></h3>

    <button class="pagar" onclick="abrirPago()">Pagar</button>

    <!-- Stripe form -->
    <div id="pago" class="pago-box hidden">
      <h3>Pagar con tarjeta</h3>
      <form id="payment-form">
        <div id="payment-element"></div>
        <button id="submit">Pagar ahora</button>
      </form>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
